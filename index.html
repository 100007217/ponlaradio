<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Delay Pro - COPE iOS Fijo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            margin-bottom: 15px;
        }
        .live-clock {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00bfff;
            background: #252525;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-family: monospace;
            border: 1px solid #333;
        }
        h1 { font-size: 1.2rem; color: #00ff88; margin: 0 0 10px 0; }
        .delay-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .delay-display span { font-size: 1.1rem; color: #aaa; }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            margin: 4px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn:active { background-color: #444; transform: scale(0.98); }
        .btn-main { background-color: #00ff88; color: #121212; width: 100%; font-size: 1.2rem; margin-bottom: 10px; }
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .status { color: #888; font-size: 0.8rem; margin-top: 8px; }
        
        .transcript-container {
            width: 100%;
            max-width: 420px;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 15px;
            box-sizing: border-box;
            margin-top: 10px;
        }
        h2 { font-size: 1rem; color: #00bfff; margin: 0 0 8px 0; text-align: left; }
        
        .live-text {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            font-style: italic;
            color: #ccc;
            min-height: 35px;
            font-size: 0.9rem;
            text-align: left;
            border-left: 4px solid #00ff88;
        }
        .events-list {
            max-height: 220px;
            overflow-y: auto;
            text-align: left;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .event-item {
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            border-left: 4px solid #ffaa00;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .keyword-match { color: #ffaa00; font-weight: bold; font-size: 1.05rem; }
        .event-time { color: #888; font-family: monospace; font-size: 0.85rem; }
        .time-elapsed {
            background: #d9534f;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 6px;
        }
        .btn-toggle {
            width: 100%;
            background-color: #2b5c8f;
            color: white;
            margin-bottom: 10px;
        }
        .btn-toggle.active { background-color: #28a745; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="liveClock" class="live-clock">00:00:00</div>

    <h1>⏱️ Sincro Radio Pro (A Fransi)</h1>
    <button id="playBtn" class="btn btn-main">CONECTAR Y REPRODUCIR</button>
    
    <div class="delay-display"><span id="delaySeconds">0.0</span> <span>seg</span></div>
    
    <div class="grid-buttons">
        <button class="btn" onclick="ajustarRetraso(1)">+1s</button>
        <button class="btn" onclick="ajustarRetraso(-1)">-1s</button>
        <button class="btn" onclick="ajustarRetraso(5)">+5s</button>
        <button class="btn" onclick="ajustarRetraso(-5)">-5s</button>
        <button class="btn" onclick="ajustarRetraso(0.5)">+0.5s</button>
        <button class="btn" onclick="ajustarRetraso(-0.5)">-0.5s</button>
    </div>
    
    <button class="btn" style="width:100%; background:#d9534f; margin-top: 8px;" onclick="resetear()">Reset (0s)</button>
    <div id="status" class="status">Radio detenida</div>
</div>

<div style="width: 100%; max-width: 420px;">
    <button id="toggleTranscriptBtn" class="btn btn-toggle">🎙️ TRANSCRIPCIÓN: APAGADA</button>
</div>

<div id="transcriptModule" class="transcript-container hidden">
    <h2>📋 Historial (Palabras clave capturadas)</h2>
    <ul id="eventsList" class="events-list">
        <li id="noEvents" style="color:#666; font-size:0.85rem; margin-bottom: 15px;">Esperando eventos clave del partido...</li>
    </ul>

    <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">

    <h2>🎙️ Texto en directo</h2>
    <div id="liveText" class="live-text">El transcriptor está activo...</div>
</div>

<script>
let audioCtx, delayNode, audioHTML;
let retrasoActual = 0;
const maxDelayTime = 60;

// CAMBIO CLAVE PARA IPHONE: Usamos la URL de stream MP3 directo (No HLS), saltando el bloqueo de iOS
const urlStream = "https://flumotion-cope-net1.vrtserver.club/cope/net1.mp3"; 

const playBtn = document.getElementById('playBtn');
const delayDisplay = document.getElementById('delaySeconds');
const statusDisplay = document.getElementById('status');
const liveTextDisplay = document.getElementById('liveText');
const eventsList = document.getElementById('eventsList');
const liveClock = document.getElementById('liveClock');
const toggleTranscriptBtn = document.getElementById('toggleTranscriptBtn');
const transcriptModule = document.getElementById('transcriptModule');

// DICCIONARIO EXPANDIDO CON EMOJIS PERSONALIZADOS
const mapaPalabras = {
    "córner": "📐 CÓRNER", "corner": "📐 CÓRNER",
    "falta": "🧎 FALTA",
    "gol": "⚽ ¡¡GOL!!",
    "disparo": "🚀 DISPARO", "chut": "🚀 CHUT", "remate": "🚀 REMATE", "tiró": "🚀 DISPARO",
    "amarilla": "🟨 TARJETA AMARILLA",
    "roja": "🟥 TARJETA ROJA", "expulsado": "🟥 TARJETA ROJA",
    "penalti": "🎯 PENALTI", "penalty": "🎯 PENALTI",
    "minuto": "⏱️ MINUTO"
};

let listaEventosGuardados = []; 
let transcriptorActivo = false;
let recognition = null;

// RELOJ Y ACTUALIZADOR DE MARCAS DE TIEMPO
setInterval(() => {
    const ahora = new Date();
    liveClock.innerText = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    
    if (transcriptorActivo) {
        listaEventosGuardados.forEach(evento => {
            const diffSegundos = Math.floor((ahora - evento.timestamp) / 1000);
            let textoDiferencia = diffSegundos < 60 ? `hace ${diffSegundos}s` : `hace ${Math.floor(diffSegundos / 60)}m ${diffSegundos % 60}s`;
            const badge = document.getElementById(`badge-${evento.id}`);
            if (badge) badge.innerText = textoDiferencia;
        });
    }
}, 1000);

// GESTIÓN DE REPRODUCCIÓN COMPATIBLE CON IPHONE
playBtn.addEventListener('click', async () => {
    if (!audioCtx) {
        statusDisplay.innerText = "Iniciando audio en iOS...";
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
        
        inicializarAudioDirecto();
    } else if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
        audioHTML.play();
        playBtn.innerText = "PAUSAR AUDIO";
    } else {
        audioCtx.suspend();
        audioHTML.pause();
        playBtn.innerText = "REANUDAR AUDIO";
    }
});

function inicializarAudioDirecto() {
    delayNode = audioCtx.createDelay(maxDelayTime);
    delayNode.delayTime.setValueAtTime(retrasoActual, audioCtx.currentTime);
    
    audioHTML = new Audio();
    audioHTML.crossOrigin = "anonymous";
    audioHTML.playsInline = true;
    audioHTML.src = urlStream;

    // Conexión directa del flujo de datos
    const source = audioCtx.createMediaElementSource(audioHTML);
    source.connect(delayNode);
    delayNode.connect(audioCtx.destination);
    
    audioHTML.play().then(() => {
        playBtn.innerText = "PAUSAR AUDIO";
        statusDisplay.innerText = "Radio sincronizada. ¡Prueba los botones!";
    }).catch(e => {
        statusDisplay.innerText = "Error. Toca 'Reproducir' de nuevo.";
        console.error(e);
    });
}

// TOGGLE TRANSCRIPCIÓN
toggleTranscriptBtn.addEventListener('click', () => {
    transcriptorActivo = !transcriptorActivo;
    if (transcriptorActivo) {
        toggleTranscriptBtn.innerText = "🎙️ TRANSCRIPCIÓN: ENCENDIDA";
        toggleTranscriptBtn.classList.add('active');
        transcriptModule.classList.remove('hidden');
        if (!recognition) inicializarTranscriptor();
        else try { recognition.start(); } catch(e) {}
    } else {
        toggleTranscriptBtn.innerText = "🎙️ TRANSCRIPCIÓN: APAGADA";
        toggleTranscriptBtn.classList.remove('active');
        transcriptModule.classList.add('hidden');
        if (recognition) recognition.abort();
    }
});

function inicializarTranscriptor() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        liveTextDisplay.innerText = "Dictado no soportado en este iPhone.";
        return;
    }
    recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        if (!transcriptorActivo) return;
        let textoProvisional = '';
        let textoFinal = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                textoFinal += event.results[i][0].transcript;
                procesarTextoFinal(event.results[i][0].transcript.toLowerCase());
            } else {
                textoProvisional += event.results[i][0].transcript;
            }
        }
        liveTextDisplay.innerText = textoFinal || textoProvisional;
    };
    recognition.onend = () => { if (transcriptorActivo) try { recognition.start(); } catch(e) {} };
    recognition.start();
}

function procesarTextoFinal(texto) {
    // Escanear el texto buscando las nuevas claves del partido
    Object.keys(mapaPalabras).forEach(clave => {
        if (texto.includes(clave)) {
            agregarEventoAHistorial(mapaPalabras[clave]);
        }
    });
}

function agregarEventoAHistorial(textoLimpio) {
    const noEventsMsg = document.getElementById('noEvents');
    if (noEventsMsg) noEventsMsg.remove();

    // Evitar duplicar el mismo evento si se procesa la misma frase corta dos veces
    if (listaEventosGuardados.length > 0) {
        const ultimoEvento = listaEventosGuardados[listaEventosGuardados.length - 1];
        if (ultimoEvento.texto === textoLimpio && (new Date() - ultimoEvento.timestamp) < 4000) {
            return; // Bloquea duplicados en ráfagas de 4 segundos
        }
    }

    const ahora = new Date();
    const horaDisparo = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const idUnico = Date.now();

    listaEventosGuardados.push({ id: idUnico, timestamp: ahora, texto: textoLimpio });

    const li = document.createElement('li');
    li.className = 'event-item';
    li.innerHTML = `
        <span class="keyword-match">${textoLimpio}</span>
        <div>
            <span class="event-time">[${horaDisparo}]</span>
            <span class="time-elapsed" id="badge-${idUnico}">hace 0s</span>
        </div>
    `;
    eventsList.insertBefore(li, eventsList.firstChild);
}

function ajustarRetraso(segundos) {
    if (!delayNode) return;
    retrasoActual += segundos;
    if (retrasoActual < 0) retrasoActual = 0;
    if (retrasoActual > maxDelayTime) retrasoActual = maxDelayTime;
    delayNode.delayTime.setValueAtTime(retrasoActual, audioCtx.currentTime);
    delayDisplay.innerText = retrasoActual.toFixed(1);
}

function resetear() {
    if (!delayNode) return;
    retrasoActual = 0;
    delayNode.delayTime.setValueAtTime(retrasoActual, audioCtx.currentTime);
    delayDisplay.innerText = "0.0";
}
</script>

</body>
</html>
