<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Delay - HLS COPE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 400px;
        }
        h1 { font-size: 1.5rem; color: #00ff88; margin-bottom: 20px; }
        .delay-display {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 20px 0;
            color: #ffffff;
        }
        .delay-display span { font-size: 1.5rem; color: #aaa; }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            margin: 8px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn:active { background-color: #444; transform: scale(0.98); }
        .btn-main { background-color: #00ff88; color: #121212; width: 80%; font-size: 1.4rem; }
        .btn-main:active { background-color: #00cc6e; }
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        .status { color: #888; font-size: 0.9rem; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⏱️ Sincro Radio HLS</h1>
    
    <button id="playBtn" class="btn btn-main">CONECTAR Y REPRODUCIR</button>
    
    <div class="delay-display"><span id="delaySeconds">0.0</span> <span>seg</span></div>
    
    <div class="grid-buttons">
        <button class="btn" onclick="ajustarRetraso(1)">+1s</button>
        <button class="btn" onclick="ajustarRetraso(-1)">-1s</button>
        <button class="btn" onclick="ajustarRetraso(5)">+5s</button>
        <button class="btn" onclick="ajustarRetraso(-5)">-5s</button>
        <button class="btn" onclick="ajustarRetraso(0.5)">+0.5s</button>
        <button class="btn" onclick="ajustarRetraso(-0.5)">-0.5s</button>
    </div>
    
    <button class="btn" style="width:100%; background:#d9534f;" onclick="resetear()">Reset (0s)</button>

    <div id="status" class="status">Radio detenida</div>
</div>

<script>
let audioCtx;
let delayNode;
let audioHTML;
let hls;
let retrasoActual = 0;
const maxDelayTime = 60;

// ⚠️ PON AQUÍ TU ENLACE .m3u8 COMPLETO
const urlStream = "https://net1-cope.flumotion.com/playlist.m3u8?rp_source=1";

const playBtn = document.getElementById('playBtn');
const delayDisplay = document.getElementById('delaySeconds');
const statusDisplay = document.getElementById('status');

playBtn.addEventListener('click', () => {
    if (!audioCtx) {
        inicializarAudio();
    } else if (audioCtx.state === 'suspended') {
        audioCtx.resume();
        audioHTML.play();
        playBtn.innerText = "PAUSAR AUDIO";
        statusDisplay.innerText = "Escuchando...";
    } else {
        audioCtx.suspend();
        audioHTML.pause();
        playBtn.innerText = "REANUDAR AUDIO";
        statusDisplay.innerText = "Audio en pausa";
    }
});

function inicializarAudio() {
    statusDisplay.innerText = "Procesando streaming m3u8...";
    
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    delayNode = audioCtx.createDelay(maxDelayTime);
    delayNode.delayTime.value = retrasoActual;
    
    audioHTML = new Audio();
    audioHTML.crossOrigin = "anonymous";

    // Si el navegador soporta HLS nativamente (como Safari en iPhone)
    if (audioHTML.canPlayType('application/vnd.apple.mpegurl')) {
        audioHTML.src = urlStream;
        conectarAudioContext();
    } 
    // Para la mayoría de navegadores (Chrome, Android, Firefox) usamos hls.js
    else if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(urlStream);
        hls.attachMedia(audioHTML);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            conectarAudioContext();
        });
    } else {
        statusDisplay.innerText = "Tu navegador no soporta streaming HLS.";
    }
}

function conectarAudioContext() {
    const source = audioCtx.createMediaElementSource(audioHTML);
    source.connect(delayNode);
    delayNode.connect(audioCtx.destination);
    
    audioHTML.play().then(() => {
        playBtn.innerText = "PAUSAR AUDIO";
        statusDisplay.innerText = "Sincronizando directo...";
    }).catch(err => {
        statusDisplay.innerText = "Error. Dale al play otra vez.";
        console.error(err);
    });
}

function ajustarRetraso(segundos) {
    if (!delayNode) return;
    retrasoActual += segundos;
    
    if (retrasoActual < 0) retrasoActual = 0;
    if (retrasoActual > maxDelayTime) retrasoActual = maxDelayTime;
    
    delayNode.delayTime.setValueAtTime(retrasoActual, audioCtx.currentTime);
    delayDisplay.innerText = retrasoActual.toFixed(1);
}

function resetear() {
    if (!delayNode) return;
    retrasoActual = 0;
    delayNode.delayTime.setValueAtTime(retrasoActual, audioCtx.currentTime);
    delayDisplay.innerText = "0.0";
}
</script>

</body>
</html>
