<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Delay Pro - COPE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            margin-bottom: 15px;
        }
        .live-clock {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00bfff;
            background: #252525;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-family: monospace;
            border: 1px solid #333;
        }
        h1 { font-size: 1.2rem; color: #00ff88; margin: 0 0 10px 0; }
        .delay-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .delay-display span { font-size: 1.1rem; color: #aaa; }
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            margin: 4px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn:active { background-color: #444; transform: scale(0.98); }
        .btn-main { background-color: #00ff88; color: #121212; width: 100%; font-size: 1.2rem; margin-bottom: 10px; }
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .status { color: #888; font-size: 0.8rem; margin-top: 8px; }
        
        /* ESTILOS DEL MODULO DE TRANSCRIPCIÓN */
        .transcript-container {
            width: 100%;
            max-width: 420px;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 15px;
            box-sizing: border-box;
            margin-top: 10px;
        }
        h2 { font-size: 1rem; color: #00bfff; margin: 0 0 8px 0; text-align: left; }
        
        .live-text {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 10px;
            font-style: italic;
            color: #ccc;
            min-height: 35px;
            font-size: 0.9rem;
            text-align: left;
            border-left: 4px solid #00ff88;
        }
        .events-list {
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .event-item {
            background: #252525;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            border-left: 4px solid #ffaa00;
        }
        .event-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .keyword-match { color: #ffaa00; font-weight: bold; }
        .event-time { color: #888; font-family: monospace; }
        .time-elapsed {
            background: #d9534f;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .event-phrase {
            color: #bbb;
            display: block;
            margin-top: 2px;
        }

        /* BOTÓN TOGGLE TRANSCRIPCIÓN */
        .btn-toggle {
            width: 100%;
            background-color: #2b5c8f;
            color: white;
            margin-bottom: 10px;
        }
        .btn-toggle.active {
            background-color: #28a745;
        }
        
        /* CLASE PARA OCULTAR BLOQUES DE FORMA LIMPIA */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="liveClock" class="live-clock">00:00:00</div>

    <h1>⏱️ Sincro Radio Pro</h1>
    <button id="playBtn" class="btn btn-main">CONECTAR Y REPRODUCIR</button>
    
    <div class="delay-display"><span id="delaySeconds">0.0</span> <span>seg</span></div>
    
    <div class="grid-buttons">
        <button class="btn" onclick="ajustarRetraso(1)">+1s</button>
        <button class="btn" onclick="ajustarRetraso(-1)">-1s</button>
        <button class="btn" onclick="ajustarRetraso(5)">+5s</button>
        <button class="btn" onclick="ajustarRetraso(-5)">-5s</button>
        <button class="btn" onclick="ajustarRetraso(0.5)">+0.5s</button>
        <button class="btn" onclick="ajustarRetraso(-0.5)">-0.5s</button>
    </div>
    
    <button class="btn" style="width:100%; background:#d9534f; margin-top: 8px;" onclick="resetear()">Reset (0s)</button>
    <div id="status" class="status">Radio detenida</div>
</div>

<div style="width: 100%; max-width: 420px;">
    <button id="toggleTranscriptBtn" class="btn btn-toggle">🎙️ TRANSCRIPCIÓN: APAGADA</button>
</div>

<div id="transcriptModule" class="transcript-container hidden">
    <h2>📋 Historial (Diferencia con hora actual)</h2>
    <ul id="eventsList" class="events-list">
        <li id="noEvents" style="color:#666; font-size:0.85rem; margin-bottom: 15px;">Esperando jugadas clave (córner, minuto, gol, falta)...</li>
    </ul>

    <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">

    <h2>🎙️ Texto en directo</h2>
    <div id="liveText" class="live-text">El transcriptor está activo...</div>
</div>

<script>
let audioCtx, delayNode, audioHTML, hls;
let retrasoActual = 0;
const maxDelayTime = 60;
const urlStream = "https://net1-cope.flumotion.com/playlist.m3u8?rp_source=1"; 

const playBtn = document.getElementById('playBtn');
const delayDisplay = document.getElementById('delaySeconds');
const statusDisplay = document.getElementById('status');
const liveTextDisplay = document.getElementById('liveText');
const eventsList = document.getElementById('eventsList');
const liveClock = document.getElementById('liveClock');

// Elementos del Toggle
const toggleTranscriptBtn = document.getElementById('toggleTranscriptBtn');
const transcriptModule = document.getElementById('transcriptModule');

const palabrasClave = ["córner", "corner", "minuto", "gol", "falta", "penalti", "tarjeta", "fuera de juego"];
let listaEventosGuardados = []; 
let transcriptorActivo = false;
let recognition = null;

// RELOJ Y CONTADOR DINÁMICO
setInterval(() => {
    const ahora = new Date();
    liveClock.innerText = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    
    if (transcriptorActivo) {
        listaEventosGuardados.forEach(evento => {
            const diffMs = ahora - evento.timestamp;
            const diffSegundos = Math.floor(diffMs / 1000);
            
            let textoDiferencia = "";
            if (diffSegundos < 60) {
                textoDiferencia = `hace ${diffSegundos}s`;
            } else {
                const min = Math.floor(diffSegundos / 60);
                const seg = diffSegundos % 60;
                textoDiferencia = `hace ${min}m ${seg}s`;
            }
            const badge = document.getElementById(`badge-${evento.id}`);
            if (badge) badge.innerText = textoDiferencia;
        });
    }
}, 1000);


playBtn.addEventListener('click', async () => {
    // CORRECCIÓN PARA iOS: El contexto de audio debe arrancar SÍ O SÍ con el primer tap
    if (!audioCtx) {
        // 1. Inicializar el contexto inmediatamente
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 2. Si el contexto arranca suspendido (típico de iOS), lo despertamos
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }
        
        // 3. Ahora cargamos y conectamos el flujo
        inicializarAudio();
    } else if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
        audioHTML.play();
        playBtn.innerText = "PAUSAR AUDIO";
    } else {
        audioCtx.suspend();
        audioHTML.pause();
        playBtn.innerText = "REANUDAR AUDIO";
    }
});

// LÓGICA DEL BOTÓN TOGGLE
toggleTranscriptBtn.addEventListener('click', () => {
    transcriptorActivo = !transcriptorActivo;

    if (transcriptorActivo) {
        toggleTranscriptBtn.innerText = "🎙️ TRANSCRIPCIÓN: ENCENDIDA";
        toggleTranscriptBtn.classList.add('active');
        transcriptModule.classList.remove('hidden'); // Mostrar los bloques
        
        if (!recognition) {
            inicializarTranscriptor();
        } else {
            try { recognition.start(); } catch(e) {}
        }
    } else {
        toggleTranscriptBtn.innerText = "🎙️ TRANSCRIPCIÓN: APAGADA";
        toggleTranscriptBtn.classList.remove('active');
        transcriptModule.classList.add('hidden'); // Ocultar los bloques
        
        if (recognition) {
            recognition.abort(); // Detener el uso del micro
        }
    }
});

function inicializarAudio() {
    statusDisplay.innerText = "Conectando stream...";
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    delayNode = audioCtx.createDelay(maxDelayTime);
    delayNode.delayTime.value = retrasoActual;
    
    audioHTML = new Audio();
    audioHTML.crossOrigin = "anonymous";

    if (audioHTML.canPlayType('application/vnd.apple.mpegurl')) {
        audioHTML.src = urlStream;
        conectarAudioContext();
    } else if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(urlStream);
        hls.attachMedia(audioHTML);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            conectarAudioContext();
        });
    }
}

function conectarAudioContext() {
    const source = audioCtx.createMediaElementSource(audioHTML);
    source.connect(delayNode);
    delayNode.connect(audioCtx.destination);
    audioHTML.play();
    playBtn.innerText = "PAUSAR AUDIO";
    statusDisplay.innerText = "Radio sincronizada.";
}

function inicializarTranscriptor() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        liveTextDisplay.innerText = "Navegador no compatible con dictado.";
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        if (!transcriptorActivo) return;
        let textoProvisional = '';
        let textoFinal = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                textoFinal += event.results[i][0].transcript;
                procesarTextoFinal(event.results[i][0].transcript.toLowerCase());
            } else {
                textoProvisional += event.results[i][0].transcript;
            }
        }
        liveTextDisplay.innerText = textoFinal || textoProvisional;
    };

    recognition.onend = () => { 
        // Solo reinicia automáticamente si el usuario no ha apagado el toggle manualmente
        if (transcriptorActivo) {
            try { recognition.start(); } catch(e) {}
        }
    };
    
    recognition.start();
}

function procesarTextoFinal(texto) {
    palabrasClave.forEach(palabra => {
        if (texto.includes(palabra)) {
            agregarEventoAHistorial(palabra, texto);
        }
    });
}

function agregarEventoAHistorial(palabra, fraseCompleta) {
    const noEventsMsg = document.getElementById('noEvents');
    if (noEventsMsg) noEventsMsg.remove();

    const ahora = new Date();
    const horaDisparo = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const idUnico = Date.now();

    listaEventosGuardados.push({
        id: idUnico,
        timestamp: ahora,
        palabra: palabra
    });

    const fraseCorta = fraseCompleta.length > 55 ? fraseCompleta.substring(0, 55) + "..." : fraseCompleta;

    const li = document.createElement('li');
    li.className = 'event-item';
    li.innerHTML = `
        <div class="event-header">
            <span>⚽ <span class="keyword-match">${palabra.toUpperCase()}</span></span>
            <div>
                <span class="event-time" style="margin-right:6px;">[${horaDisparo}]</span>
                <span class="time-elapsed" id="badge-${idUnico}">hace 0s</span>
            </div>
        </div>
        <span class="event-phrase">"${fraseCorta}"</span>
    `;

    eventsList.insertBefore(li, eventsList.firstChild);
}

function ajustarRetraso(segundos) {
    if (!delayNode) return;
    retrasoActual += segundos;
    if (retrasoActual < 0) retrasoActual = 0;
    if (retrasoActual > maxDelayTime) retrasoActual = maxDelayTime;
    delayNode.delayTime.setValueAtTime(retrasoActual, audioCtx.currentTime);
    delayDisplay.innerText = retrasoActual.toFixed(1);
}

function resetear() {
    if (!delayNode) return;
    retrasoActual = 0;
    delayNode.delayTime.setValueAtTime(retrasoActual, audioCtx.currentTime);
    delayDisplay.innerText = "0.0";
}
</script>

</body>
</html>
